aid: irobot
name: iRobot
description: >-
  iRobot Corporation is a Bedford, Massachusetts consumer robotics company best
  known for the Roomba robot vacuum and the Braava and Braava jet robot mop
  product lines. Founded in 1990 by MIT roboticists, iRobot pioneered the home
  cleaning robot category and has sold tens of millions of units worldwide. Its
  current portfolio includes the Roomba Max, Roomba Plus, and Roomba 100/200
  series vacuums and combo (vacuum + mop) models, along with AutoWash and
  AutoEmpty docks, the iRobot Home App for scheduling and mapping, and a
  cleaning accessories and trade-in program. The proposed acquisition by
  Amazon was abandoned in January 2024 after regulatory pushback from the
  European Commission, after which iRobot underwent a major restructuring and
  layoffs. iRobot's revenue model is direct robot and accessory sales plus
  recurring consumables; it does not publish a public developer API, SDK, or
  OpenAPI specification, and its homesupport documentation explicitly notes
  that Wi-Fi connected Roombas do not have an open API. A community of
  unofficial reverse-engineered libraries (dorita980, rest980, pyirobot) exists
  but is not endorsed by iRobot.
